<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<title>Live Consultation</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

.box{
background:#1e293b;
padding:40px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.status{
color:#22c55e;
font-size:20px;
margin-bottom:20px;
}

.bottom-section{
display:flex;
justify-content:center;
gap:30px;
margin-top:25px;
}

.chat-section{
width:45%;
}

.prescription-section{
width:45%;
}

#chatBox{
height:200px;
border:1px solid white;
border-radius:6px;
padding:10px;
overflow-y:auto;
margin-bottom:10px;
background:#0f172a;
}

textarea{
width:100%;
height:180px;
border-radius:6px;
padding:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#16a34a;
}

</style>

</head>

<body>

<div class="box">

<h2>Telemedicine Consultation</h2>

<div class="status">🟢 Consultation Active</div>

<p><b>Patient:</b> {{patient}}</p>

<p><b>Doctor:</b> Dr. {{doctor}}</p>

<p><b>Time:</b> {{time}}</p>



<hr>

<div class="bottom-section">

<div class="chat-section">
<h3>Chat</h3>

<div id="chatBox"></div>

<input type="text" id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

</div>

<div class="prescription-section">

<h3>Prescription</h3>

<textarea id="prescriptionText" placeholder="Doctor writes medicines here"></textarea>

<button onclick="printPrescription()">Print Prescription</button>

</div>

</div>

<br>

<button onclick="endConsultation()">End Consultation</button>

<br>

<a href="/dashboard">
<button style="
padding:10px 18px;
background:#2ecc71;
color:white;
border:none;
border-radius:8px;
font-size:14px;
cursor:pointer;
transition:0.3s;
"
onmouseover="this.style.background='#27ae60'"
onmouseout="this.style.background='#2ecc71'">
Back to Dashboard
</button>
</a>

</div>
</body>
</html>
