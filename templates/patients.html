<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
body{
margin:0;
min-height:100vh;

background: linear-gradient(135deg,#1f4037,#99f2c8);

font-family:Arial, sans-serif;
color:white;
text-align:center;
}

body{
    background-color:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

table{
margin:40px auto;

border-collapse:collapse;
width:60%;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);

border-radius:10px;
overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

th, td{
padding:14px 18px;
border-bottom:1px solid rgba(255,255,255,0.2);
}

button{
    background:black;
    color:white;
    border:1px solid white;
    padding:8px 15px;
    cursor:pointer;
}
th{
background:rgba(0,0,0,0.2);
font-weight:bold;
}

tr:hover{
background:rgba(255,255,255,0.1);
transform:scale(1.01);
transition:0.2s;
}

.delete-btn{
background:#e74c3c;
color:white;
border:none;

padding:6px 12px;
border-radius:6px;

cursor:pointer;
transition:0.2s;
}

.delete-btn:hover{
background:#c0392b;
transform:scale(1.05);
}


a{
    color:white;
    text-decoration:none;
}

h2{
    margin-top:30px;
}
body{
animation: pageLoad 0.6s ease;
}

@keyframes pageLoad{
0%{
opacity:0;
transform: translateY(20px);
}

100%{
opacity:1;
transform: translateY(0);
}
}

</style>
<h2>Electronic Medical Records</h2>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Age</th>
<th>Gender</th>
<th>Diagnosis</th>
</tr>

{% for patient in patients %}
<tr>
<td>{{patient[0]}}</td>
<td>{{patient[1]}}</td>
<td>{{patient[2]}}</td>
<td>{{patient[3]}}</td>
<td>{{patient[4]}}</td>
<td>
<a href="/delete_patient/{{ patient[0] }}">
<button class="delete-btn">Delete</button>
</a>
</td>

</tr>
{% endfor %}

<div class="table-container">

<table>

<br>
<a href="/add_patient">
<button style="
margin-right:15px;
padding:10px 18px;
background:#3498db;
color:white;
border:none;
border-radius:8px;
font-size:14px;
cursor:pointer;
transition:0.3s;
"
onmouseover="this.style.background='#2980b9'"
onmouseout="this.style.background='#3498db'">
Add Patient
</button>
</a>

<a href="/dashboard">
<button style="
padding:10px 18px;
background:#2ecc71;
color:white;
border:none;
border-radius:8px;
font-size:14px;
cursor:pointer;
transition:0.3s;
"
onmouseover="this.style.background='#27ae60'"
onmouseout="this.style.background='#2ecc71'">
Back to Dashboard
</button>
</a>
