<!DOCTYPE html><html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<title>Prescription</title><style>
.field-input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}
body{
margin:0;
min-height:100vh;

font-family: 'Segoe UI', sans-serif;

background: linear-gradient(135deg,#1f4037,#99f2c8);

display:flex;
flex-direction:column;
align-items:center;

color:white;
}
body{
font-family: Arial, sans-serif;

background-image:url("/static/img/prescription.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

display:flex;
justify-content:center;
padding:40px;
}

.prescription-box{
width:700px;
background:rgba(240, 235, 235, 0.95);
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
color:#2c3e50;
}

.line{
border-bottom:2px solid #ddd;
margin:15px 0;
}

.field{
margin:10px 0;
font-size:18px;
}

.medicine-box{
margin-top:20px;
padding:15px;
border:1px solid #ddd;
border-radius:8px;
width:100%;
height:150px;
font-size:16px;
}

button{
margin-top:25px;
padding:12px 20px;
background:#3498db;
border:none;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

/* Hide buttons when printing */
@media print{

body{
background:white;
}

.prescription-box{
box-shadow:none;
}

button{
display:none;
}

}

@media print{

button{
display:none;
}

body{
background:white;
}

}
body{
animation: pageLoad 0.6s ease;
}

@keyframes pageLoad{
0%{
opacity:0;
transform: translateY(20px);
}

100%{
opacity:1;
transform: translateY(0);
}
}

</style></head><body><div class="prescription-box"><div class="header">
<h1>🏥 City Hospital</h1>
<p>Official Medical Prescription</p>
</div><div class="line"></div><div class="field">
<label>Patient Name:</label>
<input type="text" class="field-input"> 
</div><div class="field">
<label>Doctor Name:</label>
<input type="text" class="field-input">
</div><div class="field">
<label>Date:</label>
<input type="date" class="field-input">
</div><div class="line"></div><h3>Medicines</h3>

<textarea class="medicine-box" placeholder="Enter medicines here...
Example:
Paracetamol – 1 tablet after meal
Amoxicillin – Twice daily
Vitamin C – Before sleep"></textarea>
</div><div class="line"></div><p><b>Doctor Signature:</b> ______________________</p><button onclick="window.print()">🖨 Print / Download PDF</button>

</div></body>
</html>
