<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<title>Hospital Dashboard</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;

background:url("/static/img/dashboard.jpeg") no-repeat center center fixed;
background-size:cover;
}


/* MAIN CONTENT */

.main{
margin:auto;
max-width:900px;
padding:30px;
text-align:center;
}
/* DASHBOARD TITLE */

h1{
color:white;
margin-bottom:40px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns: repeat(2, 1fr);
gap:35px;
max-width:700px;
margin:auto;
}

.card{
background: rgba(255,255,255,0.15);
backdrop-filter: blur(10px);
-webkit-backdrop-filter: blur(10px);

border-radius:12px;
border:1px solid rgba(255,255,255,0.25);
position:relative;
overflow:hidden;

width:280px;
height:200px;

padding:28px;

box-shadow:0 8px 25px rgba(0,0,0,0.3);

display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;

text-align:center;
color:white;
transition:0.3s;
animation: floatCard 4s ease-in-out infinite;
}
.card::before{
content:'';
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.4),
transparent
);
transform:rotate(25deg);
opacity:0;
transition:0.5s;
}

.card:hover::before{
opacity:1;
animation:shine 1s;
}

@keyframes floatCard{
0%{
transform:translateY(0px);
}
50%{
transform:translateY(-6px);
}
100%{
transform:translateY(0px);
}
}

@keyframes shine{
0%{
transform:translateX(-100%) rotate(25deg);
}
100%{
transform:translateX(100%) rotate(25deg);
}
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 15px 35px rgba(0,0,0,0.4);
}

/* BUTTONS */

button{
background: rgba(255,255,255,0.2);
backdrop-filter: blur(6px);
-webkit-backdrop-filter: blur(6px);
margin-top:auto;
border:1px solid rgba(255,255,255,0.4);
color:white;

padding:10px 18px;
border-radius:8px;
cursor:pointer;
margin-top:10px;

transition:0.3s;
}

button:hover{
background: rgba(255,255,255,0.35);
transform:scale(1.05);
}

.count{
font-size:28px;
font-weight:bold;
margin:10px 0;
color: white;
}
body{
animation: pageLoad 0.6s ease;
}

@keyframes pageLoad{
0%{
opacity:0;
transform: translateY(20px);
}

100%{
opacity:1;
transform: translateY(0);
}
}

</style>
</head>

<body>

<!-- MAIN CONTENT -->

<div class="main">

<h1>Hospital Management Dashboard</h1>

<div class="cards">

<div class="card">
<h3>🧑‍🤝‍🧑 Patients</h3>
<div class="count" data-target="{{ patient_count }}">0</div>
<a href="/patients"><button>View Patients</button></a>
</div>

<div class="card">
<h3>📅 Appointments</h3>
<div class="count" data-target="{{ appointment_count }}">0</div>
<a href="/appointments"><button>Appointments</button></a>
</div>

<div class="card">
<h3>💻 Telemedicine</h3>
<a href="/telemedicine"><button>Start Consultation</button></a>
</div>

<div class="card">
<h3>💊 Prescription</h3>
<a href="/prescription"><button>Write Prescription</button></a>
</div>

</div>

</div>
<script>
const counters = document.querySelectorAll(".count");

counters.forEach(counter => {
    const target = +counter.getAttribute("data-target");
    let count = 0;

    const speed = 40;

    const updateCount = () => {
        const increment = Math.ceil(target / speed);

        if(count < target){
            count += increment;
            counter.innerText = count;
            setTimeout(updateCount, 40);
        } else {
            counter.innerText = target;
        }
    };

    updateCount();
});
</script>
</body>
</html>
