<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>


body{
margin:0;
min-height:100vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:linear-gradient(135deg,#1f4037,#99f2c8);

font-family:Arial, sans-serif;
color:white;
}

table{
    margin:auto;
    border-collapse:collapse;
}

th, td{
    border:1px solid white;
    padding:10px;
}

button{
    background:black;
    color:white;
    border:1px solid white;
    padding:8px 15px;
    cursor:pointer;
}

a{
    color:white;
    text-decoration:none;
}

h2{
    margin-top:30px;
}
.form-box{
width:420px;
padding:35px;

background: rgba(255,255,255,0.15);
backdrop-filter: blur(10px);

border-radius:15px;
border:1px solid rgba(255,255,255,0.3);

box-shadow:0 15px 40px rgba(0,0,0,0.3);

margin-top:20px;
}
label{
display:block;
margin-top:10px;
margin-bottom:5px;
font-weight:bold;
}

.save-btn{
width:100%;
padding:12px;

background: linear-gradient(135deg,#3498db,#2980b9);
color:white;

border:none;
border-radius:8px;

font-size:16px;
cursor:pointer;

margin-top:15px;

transition:0.3s;
}

.save-btn:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}
input{
width:100%;
padding:12px;

margin-top:6px;
margin-bottom:15px;

border-radius:8px;
border:none;

font-size:15px;

background:rgba(255,255,255,0.9);
}
label{
display:block;
margin-top:10px;
font-weight:bold;
}
body{
animation: pageLoad 0.6s ease;
}

@keyframes pageLoad{
0%{
opacity:0;
transform: translateY(20px);
}

100%{
opacity:1;
transform: translateY(0);
}
}

</style>
<h1 style="margin-bottom:30px;">Add Patient</h1>

<div class="form-box">

<form action="/save_patient" method="POST">

<label>Name</label>
<input type="text" name="name">

<label>Age</label>
<input type="number" name="age">

<label>Gender</label>
<input type="text" name="gender">

<label>Disease</label>
<input type="text" name="disease">

<button type="submit" class="save-btn">Save Patient</button>

</form>

</div>


<br>
<a href="/dashboard">
<button style="
padding:10px 18px;
background:#2ecc71;
color:white;
border:none;
border-radius:8px;
font-size:14px;
cursor:pointer;
transition:0.3s;
"
onmouseover="this.style.background='#27ae60'"
onmouseout="this.style.background='#2ecc71'">
Back to Dashboard
</button>
</a>
