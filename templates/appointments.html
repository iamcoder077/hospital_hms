<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>

body{
margin:0;
min-height:100vh;

font-family: 'Segoe UI', sans-serif;

background: linear-gradient(135deg,#1f4037,#99f2c8);

display:flex;
flex-direction:column;
align-items:center;

color:white;
}

body{
    background-color:#111;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

table{
    margin:auto;
    border-collapse:collapse;
}

th, td{
    border:1px solid white;
    padding:10px;
}
.form-box{
width:420px;
padding:35px;

background: rgba(255,255,255,0.15);
backdrop-filter: blur(10px);

border-radius:15px;
border:1px solid rgba(255,255,255,0.3);

box-shadow:0 15px 40px rgba(0,0,0,0.3);

margin-top:40px;
}

input{
width:100%;
padding:12px;

margin-top:8px;
margin-bottom:18px;

border-radius:8px;
border:none;

font-size:15px;
background:rgba(255,255,255,0.9);
}

button{
    background:black;
    color:white;
    border:1px solid white;
    padding:8px 15px;
    cursor:pointer;
}

a{
    color:white;
    text-decoration:none;
}

h2{
    margin-top:30px;
}
body{
animation: pageLoad 0.6s ease;
}

@keyframes pageLoad{
0%{
opacity:0;
transform: translateY(20px);
}

100%{
opacity:1;
transform: translateY(0);
}
}

</style>
<h2>Appointment Scheduling</h2>
<div class="form-box">
<form action="/save_appointment" method="POST">

Patient Name:
<input type="text" name="name"><br><br>

Doctor Name:
<input type="text" name="doctor"><br><br>

Date:
<input type="date" name="date"><br><br>

<button type="submit">Book Appointment</button>

</form>
</div>
<br>
<a href="/dashboard">
<button style="
padding:10px 18px;
background:#2ecc71;
color:white;
border:none;
border-radius:8px;
font-size:14px;
cursor:pointer;
transition:0.3s;
"
onmouseover="this.style.background='#27ae60'"
onmouseout="this.style.background='#2ecc71'">
Back to Dashboard
</button>
</a>
